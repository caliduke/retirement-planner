<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Strategy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4; }
        label { @apply block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1; }
        input { @apply w-full p-2 border rounded-md bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none text-lg; }
        .stat-label { @apply text-xs opacity-70 uppercase; }
        .bar-segment { @apply h-full transition-all duration-500; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-48">

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-bold text-gray-800">Withdrawal Lab</h1>
                <p class="text-xs text-gray-500">Live 2026 Scenario Planner</p>
            </div>
            <button onclick="saveScenario()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">Save</button>
        </header>

        <div class="card bg-slate-50 border-none mb-6">
            <label class="text-center mb-2">Cash Allocation</label>
            <div class="h-8 w-full bg-gray-200 rounded-full overflow-hidden flex mb-2">
                <div id="keepBar" class="bar-segment bg-green-500" style="width: 0%"></div>
                <div id="fedBar" class="bar-segment bg-red-400" style="width: 0%"></div>
                <div id="caBar" class="bar-segment bg-red-600" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-[10px] font-bold uppercase">
                <span class="text-green-700">Keep: <span id="keepPct">0%</span></span>
                <span class="text-red-400">Fed Tax: <span id="fedPct">0%</span></span>
                <span class="text-red-700">CA Tax: <span id="caPct">0%</span></span>
            </div>
        </div>

        <h3 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">Income</h3>
        <div class="card">
            <label>Wife's Gross Salary ($)</label>
            <input type="number" id="salary" value="125000" oninput="calculate()" onkeyup="calculate()" onchange="calculate()">
        </div>

        <div class="card border-l-4 border-purple-400">
            <label>403b Contribution ($)</label>
            <input type="number" id="contrib403b" value="25000" oninput="calculate()" onkeyup="calculate()" onchange="calculate()">
        </div>

        <div class="card">
            <label>Social Security ($)</label>
            <input type="number" id="ss" value="43200" oninput="calculate()" onkeyup="calculate()" onchange="calculate()">
        </div>

        <h3 class="text-xs font-bold text-gray-400 mb-2 mt-6 uppercase tracking-widest">Withdrawals</h3>
        <div class="card border-l-4 border-orange-400">
            <label>401k / RRSP Withdrawal ($)</label>
            <input type="number" id="taxableW" value="0" oninput="calculate()" onkeyup="calculate()" onchange="calculate()">
        </div>

        <div class="card border-l-4 border-emerald-400">
            <label>Roth / HSA Withdrawal ($)</label>
            <input type="number" id="rothW" value="0" oninput="calculate()" onkeyup="calculate()" onchange="calculate()">
        </div>

        <div class="card border-l-4 border-red-500">
            <label>RRSP Internal Growth ($)</label>
            <input type="number" id="rrspGrowth" value="0" oninput="calculate()" onkeyup="calculate()" onchange="calculate()">
        </div>

        <div id="scenarioList" class="mt-6 pb-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-6 rounded-t-3xl shadow-2xl max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4">
            <div id="irmaaBadge" class="px-3 py-1 rounded-full text-xs font-bold bg-green-500">Checking...</div>
            <div class="text-right">
                <p class="stat-label text-blue-300">Net Take Home</p>
                <p id="netHome" class="text-2xl font-black text-white">$0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 border-t border-slate-700 pt-4 text-center">
            <div>
                <p class="stat-label">Total Cash</p>
                <p id="totalCash" class="font-bold text-gray-300">$0</p>
            </div>
            <div>
                <p class="stat-label">Total Tax</p>
                <p id="totalTax" class="font-bold text-red-400">$0</p>
            </div>
            <div>
                <p class="stat-label">Eff. Rate</p>
                <p id="effRate" class="font-bold text-yellow-400">0%</p>
            </div>
        </div>
    </div>

    <script>
        // Use a "Safe Parse" function to prevent errors if a box is empty
        function getVal(id) {
            return parseFloat(document.getElementById(id).value) || 0;
        }

        function calculate() {
            try {
                const salary = getVal('salary');
                const contrib403b = getVal('contrib403b');
                const ss = getVal('ss');
                const taxableW = getVal('taxableW');
                const rothW = getVal('rothW');
                const rrspGrowth = getVal('rrspGrowth');

                const salaryTaxable = Math.max(0, salary - contrib403b);
                const grossCash = (salary - contrib403b) + ss + taxableW + rothW;
                const magi = salaryTaxable + ss + taxableW; 
                
                const fedTaxable = Math.max(0, (salaryTaxable + (ss * 0.85) + taxableW) - 35500);
                const fedTax = calcTax(fedTaxable, [0, 24800, 100800, 211400, 403550], [0.1, 0.12, 0.22, 0.24, 0.32]);
                
                const caTaxable = Math.max(0, (salaryTaxable + taxableW + rrspGrowth) - 11412);
                const caTax = Math.max(0, calcTax(caTaxable, [0, 22158, 52528, 82904, 115084], [0.01, 0.02, 0.04, 0.06, 0.08]) - 596);

                const totalTax = fedTax + caTax;
                const netHome = grossCash - totalTax;

                // Update UI Elements
                document.getElementById('totalCash').innerText = '$' + Math.round(grossCash).toLocaleString();
                document.getElementById('totalTax').innerText = '$' + Math.round(totalTax).toLocaleString();
                document.getElementById('netHome').innerText = '$' + Math.round(netHome).toLocaleString();
                document.getElementById('effRate').innerText = ((totalTax / (grossCash || 1)) * 100).toFixed(1) + '%';
                
                // Update Bars
                const fedPct = (fedTax / (grossCash || 1)) * 100;
                const caPct = (caTax / (grossCash || 1)) * 100;
                const keepPct = Math.max(0, 100 - fedPct - caPct);

                document.getElementById('fedBar').style.width = fedPct + '%';
                document.getElementById('caBar').style.width = caPct + '%';
                document.getElementById('keepBar').style.width = keepPct + '%';
                document.getElementById('fedPct').innerText = fedPct.toFixed(1) + '%';
                document.getElementById('caPct').innerText = caPct.toFixed(1) + '%';
                document.getElementById('keepPct').innerText = keepPct.toFixed(1) + '%';

                const badge = document.getElementById('irmaaBadge');
                if (magi <= 218000) {
                    badge.innerText = "✅ $0 Surcharge";
                    badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-500";
                } else {
                    badge.innerText = "⚠️ IRMAA Alert";
                    badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-500";
                }
            } catch (err) {
                console.error("Calculation Error:", err);
            }
        }

        function calcTax(taxable, brackets, rates) {
            let tax = 0;
            for (let i = brackets.length - 1; i >= 0; i--) {
                if (taxable > brackets[i]) {
                    tax += (taxable - brackets[i]) * (rates[i] - (rates[i-1] || 0));
                }
            }
            return tax;
        }

        // Run immediately on load
        window.onload = calculate;
    </script>
</body>
</html>
