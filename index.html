<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Lab</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Strategy Lab">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-card { @apply bg-white p-5 rounded-2xl shadow-sm border border-gray-100 transition-all duration-200; }
        .input-card:focus-within { @apply shadow-md border-blue-200 ring-4 ring-blue-50/50; }
        label { @apply block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2; }
        input { @apply w-full text-xl font-semibold text-gray-800 bg-transparent outline-none; }
        .bar-segment { @apply h-full transition-all duration-700 ease-out; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-64">

    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Strategy Lab</h1>
                <p class="text-xs font-medium text-slate-400">2026 Scenario Planner</p>
            </div>
            <div class="flex gap-2">
                <button onclick="showInstallHelp()" class="bg-slate-100 text-slate-600 p-3 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </button>
                <button onclick="saveScenario()" class="bg-slate-900 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M7.707 10.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V6h5a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h5v5.586l-1.293-1.293z" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <div class="flex justify-between items-end mb-4">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Cash Distribution</span>
                <div id="irmaaBadge" class="text-[10px] font-black px-2 py-1 rounded-md">Checking...</div>
            </div>
            <div class="h-4 w-full bg-slate-100 rounded-full overflow-hidden flex mb-4">
                <div id="keepBar" class="bar-segment bg-emerald-400"></div>
                <div id="fedBar" class="bar-segment bg-rose-400"></div>
                <div id="caBar" class="bar-segment bg-rose-600"></div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-emerald-600">Keep</p>
                    <p id="keepPct" class="text-sm font-extrabold text-slate-800">0%</p>
                </div>
                <div class="text-center border-x border-slate-100">
                    <p class="text-[10px] font-bold text-rose-400">Fed Tax</p>
                    <p id="fedPct" class="text-sm font-extrabold text-slate-800">0%</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-rose-600">CA Tax</p>
                    <p id="caPct" class="text-sm font-extrabold text-slate-800">0%</p>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Income Base</h2>
            <div class="input-card border-l-4 border-blue-500">
                <label>Wife's Gross Salary</label>
                <input type="number" id="salary" value="125000" oninput="calculate()">
            </div>
            <div class="input-card border-l-4 border-indigo-500">
                <label>403b Contribution</label>
                <input type="number" id="contrib" value="25000" oninput="calculate()">
            </div>
            <div class="input-card border-l-4 border-blue-300">
                <label>Social Security</label>
                <input type="number" id="ss" value="43200" oninput="calculate()">
            </div>

            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2 mt-8">Strategy</h2>
            <div class="input-card border-l-4 border-orange-400">
                <label>401k / RRSP Withdrawal</label>
                <input type="number" id="taxW" value="0" oninput="calculate()">
            </div>
            <div class="input-card border-l-4 border-emerald-400">
                <label>Roth / HSA Withdrawal</label>
                <input type="number" id="rothW" value="0" oninput="calculate()">
            </div>
            <div class="input-card border-l-4 border-rose-500">
                <label>RRSP Growth (CA Only)</label>
                <input type="number" id="rrspG" value="0" oninput="calculate()">
            </div>
        </div>

        <div id="scenarioList" class="mt-8"></div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 max-w-md mx-auto">
        <div class="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[10px] font-black uppercase text-blue-400 mb-1">Estimated Net Home</p>
                    <h3 id="netHome" class="text-3xl font-extrabold">$0</h3>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase text-slate-400 mb-1">Eff. Rate</p>
                    <h3 id="effRate" class="text-2xl font-extrabold text-amber-400">0%</h3>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-800">
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Gross Cash</p>
                    <p id="totalCash" class="font-bold text-slate-300">$0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Tax</p>
                    <p id="totalTax" class="font-bold text-rose-400">$0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;

        function calculate() {
            const sal = getV('salary'), con = getV('contrib'), ss = getV('ss'), 
                  taxW = getV('taxW'), rothW = getV('rothW'), rrspG = getV('rrspG');

            const salaryTaxable = Math.max(0, sal - con);
            const grossCash = salaryTaxable + ss + taxW + rothW;
            const magi = salaryTaxable + ss + taxW;
            
            const fedTax = calcTax(Math.max(0, (salaryTaxable + (ss * 0.85) + taxW) - 35500), [0, 24800, 100800, 211400, 403550], [0.1, 0.12, 0.22, 0.24, 0.32]);
            const caTax = Math.max(0, calcTax(Math.max(0, (salaryTaxable + taxW + rrspG) - 11412), [0, 22158, 52528, 82904, 115084], [0.01, 0.02, 0.04, 0.06, 0.08]) - 596);

            const totTax = fedTax + caTax;
            const net = grossCash - totTax;

            document.getElementById('totalCash').innerText = '$' + Math.round(grossCash).toLocaleString();
            document.getElementById('totalTax').innerText = '$' + Math.round(totTax).toLocaleString();
            document.getElementById('netHome').innerText = '$' + Math.round(net).toLocaleString();
            document.getElementById('effRate').innerText = ((totTax / (grossCash || 1)) * 100).toFixed(1) + '%';
            
            const fp = (fedTax / (grossCash || 1)) * 100, cp = (caTax / (grossCash || 1)) * 100;
            document.getElementById('fedBar').style.width = fp + '%';
            document.getElementById('caBar').style.width = cp + '%';
            document.getElementById('keepBar').style.width = (100-fp-cp) + '%';
            document.getElementById('fedPct').innerText = fp.toFixed(1) + '%';
            document.getElementById('caPct').innerText = cp.toFixed(1) + '%';
            document.getElementById('keepPct').innerText = (100-fp-cp).toFixed(1) + '%';

            const b = document.getElementById('irmaaBadge');
            if (magi <= 218000) { b.innerText = "SAFE"; b.className = "text-[10px] font-black px-2 py-1 rounded-md bg-emerald-100 text-emerald-700"; }
            else { b.innerText = "IRMAA ALERT"; b.className = "text-[10px] font-black px-2 py-1 rounded-md bg-rose-100 text-rose-700"; }
        }

        function calcTax(tax, brackets, rates) {
            let res = 0;
            for (let i = brackets.length - 1; i >= 0; i--) {
                if (tax > brackets[i]) res += (tax - brackets[i]) * (rates[i] - (rates[i-1] || 0));
            }
            return res;
        }

        function showInstallHelp() {
            alert("To install as an app:\n\n1. Tap 'Share' (bottom center icon)\n2. Select 'Add to Home Screen'");
        }

        window.onload = calculate;
    </script>
</body>
</html>
